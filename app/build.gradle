plugins {
    id "com.android.application"
}

android {
    namespace "com.example.phonecamera"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.phonecamera"
        minSdk 16
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "PhoneCamera-${variant.name}-${variant.versionName}.apk"
        }
    }
}
